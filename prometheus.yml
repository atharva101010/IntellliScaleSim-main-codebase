global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'intelliscalesim'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Backend API metrics
  - job_name: 'intelliscalesim-backend'
    static_configs:
      - targets: ['backend:8001']
    metrics_path: '/monitoring/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s

  # Container stats from backend
  - job_name: 'intelliscalesim-containers'
    static_configs:
      - targets: ['backend:8001']
    metrics_path: '/monitoring/prometheus'
    scrape_interval: 5s
    scrape_timeout: 4s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Redis metrics (via backend)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # PostgreSQL metrics (via backend health)
  - job_name: 'postgres'
    static_configs:
      - targets: ['backend:8001']
    metrics_path: '/healthz'
    scrape_interval: 30s
