global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'intelliscalesim'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Backend API metrics
  - job_name: 'intelliscalesim-backend'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s

  # Container stats from backend
  - job_name: 'intelliscalesim-containers'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/monitoring/metrics'
    scrape_interval: 5s
    scrape_timeout: 4s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics (commented - only works in full Docker setup)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   scrape_interval: 15s

  # cAdvisor for container metrics (commented - only works in full Docker setup)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   scrape_interval: 15s
