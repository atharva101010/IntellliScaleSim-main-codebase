global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: intelliscalesim-backend
    static_configs:
      - targets: ["backend:8001"]
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 8s

  - job_name: intelliscalesim-monitoring
    static_configs:
      - targets: ["backend:8001"]
    metrics_path: /monitoring/metrics
    scrape_interval: 10s
    scrape_timeout: 8s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
